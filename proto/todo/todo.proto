syntax = "proto3";

package todo.v1;

option go_package = "github.com/chienha0903/Todo_App/proto/todo;todopb";

service TodoService {
  rpc CreateTodo(CreateTodoRequest) returns (CreateTodoResponse);
}

message CreateTodoRequest {
  int64  user_id     = 1;
  string title       = 2;
  string description = 3;
  string priority    = 4;
  // RFC3339 string, optional
  string due_date    = 5;
}

message CreateTodoResponse {
  Todo todo = 1;
}

message Todo {
  int64  id          = 1;
  int64  user_id     = 2;
  string title       = 3;
  string description = 4;
  string status      = 5;
  string priority    = 6;
  string due_date    = 7;
  string created_at  = 8;
  string updated_at  = 9;
}

services:
  postgres:
    image: postgres:16-alpine
    container_name: todo_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: todo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d todo_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  todos:
    build:
      context: .
      dockerfile: services/todos/Dockerfile
    container_name: todo_grpc
    restart: unless-stopped
    ports:
      - "50051:50051"
    environment:
      APP_NAME: todo-app
      APP_PORT: "50051"
      APP_ENV: development
      DB_DSN: "postgres://postgres:postgres@postgres:5432/todo_db?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
